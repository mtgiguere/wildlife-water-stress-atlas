name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-lint-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest-cov ruff pip-audit

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest

      - name: Vulnerability audit
        run: |
          pip-audit