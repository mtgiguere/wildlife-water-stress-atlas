name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-lint-audit:
    name: test-lint-audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest-cov ruff pip-audit

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest

      - name: Vulnerability audit
        run: |
          # CVE-2026-3219 is a vulnerability in pip itself, not in our dependencies.
          # pip-audit flags the pip version used to run the audit — a known bootstrapping
          # problem with no clean fix. We ignore it explicitly here rather than suppress
          # all audit output. Re-evaluate when a patched pip version is available.
          pip-audit --ignore-vuln CVE-2026-3219